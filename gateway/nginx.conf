# ═══════════════════════════════════════════════════════════════
# Zahi Connect - NGINX API Gateway
# Mirrors MyCalo's nginx.conf pattern
# Routes requests to the correct microservice by URL prefix
# ═══════════════════════════════════════════════════════════════

# --- Upstream servers (one per microservice) ---
upstream auth_server {
    server accounts:8001;
}

# Future: Uncomment as services are built
upstream hotel_server {
    server hotel:8002;
}
upstream rms_server {
    server restaurant:8003;
}
# upstream mobility_server {
