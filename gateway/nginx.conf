# }
# upstream ai_server {
#     server ai_service:8006;
# }
# upstream waas_server {
#     server waas_service:8007;
# }

server {
    listen 80;
    client_max_body_size 100M;

    # ─── 1. FRONTEND (React / Next.js) ───────────────────────
    # Serves the built frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ─── 2. AUTH SERVICE ─────────────────────────────────────
    # All /auth/* routes → auth_service:8001
    location /auth/ {
        proxy_pass http://auth_server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass cookies (needed for HttpOnly refresh token)
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # ─── 3. HMS SERVICE (Hotel Management) ───────────────────
    location /hotel/ {
        proxy_pass http://hotel_server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 4. RMS SERVICE (Restaurant Management) ─────────────
    location /rms/ {
        proxy_pass http://rms_server;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 5. MOBILITY SERVICE (Cabs / Fleet) ─────────────────
