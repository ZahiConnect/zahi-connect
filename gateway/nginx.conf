# ═══════════════════════════════════════════════════════════════
# Zahi Connect - NGINX API Gateway
# Mirrors MyCalo's nginx.conf pattern
# Routes requests to the correct microservice by URL prefix
# ═══════════════════════════════════════════════════════════════

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    client_max_body_size 100M;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # ─── 1. FRONTEND (React / Next.js) ───────────────────────
    # Serves the built frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ─── 2. AUTH SERVICE ─────────────────────────────────────
    # All /auth/* routes → auth_service:8001
    location /auth/ {
        set $auth_upstream http://accounts:8001;
        proxy_pass $auth_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass cookies (needed for HttpOnly refresh token)
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # ─── 3. HMS SERVICE (Hotel Management) ───────────────────
    location /hotel/ {
        set $hotel_upstream http://hotel:8002;
        proxy_pass $hotel_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 4. RMS SERVICE (Restaurant Management) ─────────────
    location /rms/ {
        set $restaurant_upstream http://restaurant:8003;
        proxy_pass $restaurant_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ─── 5. MOBILITY SERVICE (Cabs / Fleet) ─────────────────
    location /mobility/ {
        set $mobility_upstream http://mobility:8004;
        proxy_pass $mobility_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 6. FLIGHT SERVICE (Airline Management) ─────────────────
    location /flight/ {
        set $flight_upstream http://flight:8005;
        proxy_pass $flight_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 7. AI / WaaS SERVICE ────────────────────────────────
    location /ai/ {
        set $ai_upstream http://ai_service:8006;
        proxy_pass $ai_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /booking/ {
        set $booking_upstream http://booking:8008;
        proxy_pass $booking_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── 8. WEBSOCKET SUPPORT ────────────────────────────────
    # Future: For real-time KOT, cab dispatch, WhatsApp events
    # location /ws/ {
    #     proxy_pass http://waas_server;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_read_timeout 86400;
    # }
}
